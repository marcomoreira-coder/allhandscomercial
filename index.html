<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Escalar • All Hands</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAx0AXPZX5ZpYR9JlYAytIFulfjC8j8atM",
  authDomain: "allhandscomercial-30e3d.firebaseapp.com",
  databaseURL: "https://allhandscomercial-30e3d-default-rtdb.firebaseio.com",
  projectId: "allhandscomercial-30e3d",
  storageBucket: "allhandscomercial-30e3d.firebasestorage.app",
  messagingSenderId: "523200252459",
  appId: "1:523200252459:web:975439350a5a077fef386e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const EXPIRATION = 15 * 60 * 1000;

const QUESTIONS = [
{
question:"quando alguém do time te chama com urgência você:",
options:[
["resolve na hora","Resolutivo"],
["organiza antes de agir","Guardião"],
["tenta entender a raiz do problema","Estrategista"],
["chama mais alguém pra ajudar","Relacional"],
["responde 'já vou ver isso'","Executor"]
]
},
{
question:"quando um cliente faz uma reclamação você:",
options:[
["assume a frente imediatamente","Resolutivo"],
["organiza internamente antes de responder","Guardião"],
["tenta acalmar o cenário primeiro","Relacional"],
["transforma em oportunidade de melhoria","Estrategista"],
["já pensa no impacto futuro da conta","Executor"]
]
},
{
question:"num projeto novo você costuma ser quem:",
options:[
["já começa executando","Executor"],
["organiza o plano","Guardião"],
["conecta as pessoas","Relacional"],
["questiona os detalhes","Estrategista"],
["evita que algo saia errado","Resolutivo"]
]
},
{
question:"quando aparece uma tarefa fora do esperado você:",
options:[
["improvisa e resolve","Resolutivo"],
["adapta o processo","Guardião"],
["procura alguém que já passou por isso","Relacional"],
["tenta priorizar o impacto","Estrategista"],
["cria um jeito mais eficiente de fazer","Executor"]
]
},
{
question:"o que mais te incomoda no trabalho?",
options:[
["demora nas respostas","Resolutivo"],
["falta de organização","Guardião"],
["retrabalho","Executor"],
["comunicação ruim","Relacional"],
["falta de clareza","Estrategista"]
]
},
{
question:"numa reunião você normalmente é quem:",
options:[
["conduz a conversa","Resolutivo"],
["organiza as ideias","Guardião"],
["faz perguntas importantes","Estrategista"],
["conecta os pontos","Relacional"],
["percebe o que ninguém percebeu","Executor"]
]
},
{
question:"quando algo dá muito certo você:",
options:[
["já pensa no próximo passo","Executor"],
["documenta pra repetir depois","Guardião"],
["compartilha com o time","Relacional"],
["analisa o que funcionou","Estrategista"],
["melhora ainda mais o processo","Resolutivo"]
]
},
{
question:"na prática, qual é sua maior contribuição pro time?",
options:[
["velocidade","Resolutivo"],
["organização","Guardião"],
["relacionamento","Relacional"],
["visão estratégica","Estrategista"],
["execução","Executor"]
]
}
];

const profiles = {
Resolutivo:"⚡",
Guardião:"🛡️",
Relacional:"🤝",
Estrategista:"🧠",
Executor:"🚀"
};

let current = 0;
let scores = {};
let username = "";

window.onload = () => {
renderQuestion();

onValue(ref(db,"answers"), snapshot => {
const data = snapshot.val() || {};

const now = Date.now();

const valid = Object.values(data).filter(item => now - item.createdAt < EXPIRATION);

renderRanking(valid);
});
};

function renderQuestion(){
const appDiv = document.getElementById("app");

if(current >= QUESTIONS.length){
finishQuiz();
return;
}

const q = QUESTIONS[current];

appDiv.innerHTML = `
<div class="card">
<div class="logo">ESCALAR</div>

<div class="progress">${current+1} / ${QUESTIONS.length}</div>

<h1>${q.question}</h1>

<div class="options">
${q.options.map((opt,i)=>`
<button onclick="selectAnswer('${opt[1]}')">
<span>${String.fromCharCode(65+i)}</span>
${opt[0]}
</button>
`).join("")}
</div>

</div>
`;
}

window.selectAnswer = (profile) => {
scores[profile] = (scores[profile] || 0) + 1;
current++;
renderQuestion();
};

function finishQuiz(){

let winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];

if(!username){
username = prompt("digite seu nome");
}

push(ref(db,"answers"),{
name:username,
profile:winner,
createdAt:Date.now()
});

document.getElementById("app").innerHTML = `
<div class="card center">
<div class="emoji">${profiles[winner]}</div>
<h1>${winner}</h1>
<p>
na Escalar, toda interação vende.
</p>

<button onclick="location.reload()">
refazer
</button>

<button onclick="openAdmin()" class="ghost">
adm
</button>

</div>

<div id="ranking"></div>
`;

}

function renderRanking(data){

const counts = {};

data.forEach(item=>{
counts[item.profile] = (counts[item.profile] || 0) + 1;
});

const ranking = document.getElementById("ranking");

if(!ranking) return;

ranking.innerHTML = `
<div class="ranking-card">

<h2>perfis do time</h2>

${Object.entries(counts).map(([name,count])=>`
<div class="rank-item">
<div class="left">
<span class="emoji-small">${profiles[name]}</span>
${name}
</div>

<div class="count">${count}</div>
</div>
`).join("")}

</div>
`;
}

window.openAdmin = () => {

const pass = prompt("senha admin");

if(pass !== "escalar2026"){
alert("senha incorreta");
return;
}

onValue(ref(db,"answers"), snapshot => {

const data = snapshot.val() || {};

const now = Date.now();

const valid = Object.entries(data).filter(([k,v]) => now - v.createdAt < EXPIRATION);

document.body.innerHTML = `
<div class="admin-panel">

<h1>painel admin</h1>

<button onclick="clearAll()">
limpar respostas
</button>

${valid.map(([id,item])=>`
<div class="admin-item">
<strong>${item.name}</strong>
<span>${item.profile}</span>
</div>
`).join("")}

</div>
`;

});
};

window.clearAll = () => {
remove(ref(db,"answers"));
alert("respostas apagadas");
location.reload();
};
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#140D25;
font-family:'Montserrat',sans-serif;
color:white;
padding:30px 20px;
display:flex;
justify-content:center;
}

#app{
width:100%;
max-width:700px;
}

.card{
background:#21153A;
padding:40px;
border-radius:28px;
box-shadow:0 0 40px rgba(0,0,0,.35);
}

.logo{
font-size:38px;
font-weight:800;
margin-bottom:40px;
letter-spacing:2px;
}

.progress{
color:#8D7DB8;
margin-bottom:20px;
font-size:14px;
}

h1{
font-size:34px;
line-height:1.2;
margin-bottom:30px;
}

.options{
display:flex;
flex-direction:column;
gap:14px;
}

.options button{
background:#2C1E4D;
border:none;
color:white;
padding:18px;
border-radius:18px;
font-size:16px;
text-align:left;
cursor:pointer;
transition:.2s;
font-family:'Montserrat',sans-serif;
}

.options button:hover{
background:#3B2867;
transform:translateY(-2px);
}

.options span{
margin-right:12px;
font-weight:700;
color:#A58DFF;
}

.center{
text-align:center;
}

.emoji{
font-size:70px;
margin-bottom:20px;
}

p{
opacity:.8;
margin-top:10px;
line-height:1.6;
}

button{
font-family:'Montserrat',sans-serif;
}

.center button{
margin-top:20px;
background:#7A5CFF;
border:none;
padding:16px 24px;
border-radius:16px;
color:white;
font-weight:700;
cursor:pointer;
}

.ghost{
background:transparent !important;
border:1px solid rgba(255,255,255,.1) !important;
margin-left:10px;
}

.ranking-card{
margin-top:20px;
background:#21153A;
padding:24px;
border-radius:24px;
}

.ranking-card h2{
margin-bottom:20px;
}

.rank-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.06);
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.emoji-small{
font-size:22px;
}

.count{
font-weight:700;
font-size:20px;
}

.admin-panel{
width:100%;
max-width:700px;
}

.admin-panel h1{
margin-bottom:20px;
}

.admin-panel button{
background:#ff5c5c;
border:none;
padding:14px 20px;
border-radius:14px;
color:white;
font-weight:700;
margin-bottom:20px;
cursor:pointer;
}

.admin-item{
background:#21153A;
padding:18px;
border-radius:16px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<div id="app"></div>

<div id="ranking"></div>

</body>
</html>
